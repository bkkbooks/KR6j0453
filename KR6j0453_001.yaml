body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯十方所有佛妙智悲濟者常住菩提心是故我稽首普賢即諸佛受職持金剛為調伏難調現此明王體以其法勝故淨與不淨俱真言者先修最初承事法紫檀用塗地方圓隨意成依於彼東方置前本尊像取二閼伽器香水以充足爐焚衆名香一空器承水布在於壇內食或不食俱洗漱亦如是五輪投地禮十方佛菩薩方廣大乘經合掌應至心右膝當著地多生非善業衆罪難具陳今以誠實心隨懺願清淨如前發願已全跏或半跏興大菩提心堅固無時捨名香塗手結佛部三昧耶二羽虛心合開進力微屈捻忍願初分第一文背間又屈禪智頭處其進力下第一節文側以此印當心諦觀如來儀門後真言曰唵怛他薩覩納婆二合嚩野二合引娑嚩二合引訶引三誦總持已警覺諸如來光明遍觸身業除煩惱滅後當安頂上散印成加持次結蓮華中三昧耶契相二羽准前合戒方忍願開進力亦如之若敷蓮八葉安印當心上想觀自在尊具足如本儀誦總持三遍唵跛娜慕二合納婆二合嚩野二合引娑嚩訶引警覺蓮華部聖衆發光明照觸行者身障銷為我友置印於頂右隨意而散之復結金剛甲三昧耶密印舒其二羽已右仰左覆之以其背相著檀鉤於智度慧復與禪結如十股金剛約置於當心誦明觀部主唵嚩日嚧二合納婆二合嚩野娑嚩二合引訶引警覺金剛衆聖者放光明照觸修行人加持為善友於頂左散印二羽內相叉忍願成峯狀微屈其進力各近中峯側禪智並而舒三股行已成印額右肩上左肩心亦爾其後加於喉印已成護身皆誦後明句唵嚩日囉二合引祇儞二合鉢囉二合捻跛哆二合野娑嚩二合引訶引威光發熾盛魔黨不能侵二羽各虛拳禪智捻餘指開右拳握左進度直如峯舉類於其頭大心真言曰唵一嚩日囉二合引俱嚕二合馱二摩訶麼囉三訶曩娜訶跛者四尾馱望娑二合烏摳瑟麼二合馱五吽六泮吒半音如是三遍畢已首同本尊屈頭契進峯入掌舒力度逐成頂契相唵一入嚩二合攞二入嚩二合攞三薩嚩怒瑟鹻二合四娑擔二合娑也五娑擔二合娑也六努邏遠囉二合七努瑟鹻二合八儞嚩囉也九訖叉二合十囉訖叉二合𤚥十一娑嚩二合引訶引三遍稱誦之亦同本尊頂如前二契相進力皆屈之相捻勢如環即成五處甲唵一薩嚩伽閻二摩訶帝髯三嚩日囉二合舍抳四嚩日囉二合引播舍上五摩那鉢囉二合尾捨六薩嚩努瑟鹻二合七娑擔二合婆也八娑擔二合婆也九吽泮吒吒半音呼內叉其二羽開掌諸廣舒合檀慧成峯微屈禪智節半捨進力側近申普焰成誦大心真言當胸安其印三遍持明句心同於本尊改甲進力環極舒自相合如針名捧印誦其後真言唵引俱嚕二合馱曩吽引惹入普焰契又陳禪智成針狀真言用根本名獨股金剛唵吽發吒吒半音呼發發塢仡囉二合戍攞播寧吽吽吽發發發唵擾羝寧囉曩二合娜吽吽吽發發發唵唵唵摩訶麼攞娑嚩二合引訶引本尊遍入身即同大力體堅持其地故當同金剛橛戒度方慧間忍亦屈願力亦復入檀戒願處忍進中餘度皆直舒相合成三股用禪智柱地一掣一稱明唵枳里枳里嚩日囉二合引嚩日哩二合勃引滿馱滿馱吽發吒吒字半音呼下至金剛輪堅固無能壞准前橛為本禪智度極開直堅即成三轉誦明曰唵娑囉娑囉嚩日囉二合引鉢囉二合引迦引囉吽發吒吒音半呼諦想所居地澄徹大海生誦次後真言七遍當成就唵尾麼盧娜地娑嚩二合引訶引次應想其海湧大須彌山復誦此真言經七遍方止唵婀者攞泮又想寶山上師子座莊嚴其明如後稱亦復七遍止唵婀者攞末㘑娑嚩二合引訶引師子法座上百千葉寶蓮香潔盛敷榮誦此密言曰唵迦麼攞娑嚩二合引訶引於彼蓮臺裏樓閣衆寶成懸以妙繒幡矜羯尼為網真言如後誦七遍想隨成那莫薩嚩怛他蘖帝毗逾二合尾濕嚩二合慕契毗藥二合薩嚩他缺平塢娜誐帝娑頗二合囉系𤚥誐娜劍娑嚩二合賀次復執香爐誦治路明曰唵蘇悉地羯哩入嚩二合里多去難多暮多入嚩二合攞入嚩二合攞滿馱滿馱訶曩吽發吒吒字半音呼空中有關鍵及障難皆除次結寶輅印邀迎諸聖者單已并眷屬隨意奉請之二羽當內叉進力舒相拄禪智捻進力根側第一文其腕當極開指背互著掌誦真言三遍七寶輅車成唵覩嚕覩嚕吽念至本尊居阿拏迦嚩底想乘輅車已次當奉請之准前寶輅車忍願禪智撥向內成請契真言如後誦曩麼悉底哩三合野地尾二合迦引南薩嚩怛他蘖哆南唵嚩日𠻴二合擬娘二合野迦囉灑二合野曀係曳二合呬若奉送即除薄誐挽娑嚩二合引賀聖者升寶車金剛駕御至當以部主契請降入道場二羽內相叉禪入進力間成拳竪智度每招誦後明唵嚩日囉二合引特力二合曀係曳二合呬婆誐挽嚩日囉二合引時力二合若奉迎特除曀係曳加蘖紹蘖蹉奉契又當施次舒忍願度自與進力並右居上相交智股徐動之翦除諸障者真言句如後三轉右同施唵嚩日囉二合俱嚕馱摩訶麼攞羯囉羯囉親那親那吽發次結金剛網禪捻進根下智亦加力度根側第一文真言如後稱牆以網彌覆唵尾塞普二合囉捺囉二合乞叉二合嚩日囉二合半惹囉吽發大院密縫印二羽並而舒定以慧羽加直堅禪智度三周右旋已皆誦後真言唵訶娑懵擬儞吽泮吒吒字半音呼金剛牆外圍威焰熾然住堅固界成已無能沮壞之當奉右膝傍閼伽香水器舉與額齊等誦大心真言殷勤持獻之成浴聖衆足心所希求願於此當具陳微沈空器中置水在本位如前蓮華部結彼三昧耶當鉤六度端如微敷蓮勢想為金剛葉三誦後真言唵嚩日囉二合味引囉也娑嚩二合引賀引如前運想成衆聖儼依座次當心供養水陸有諸華無主所攝華十方盡虛界人天塗香等燒香燈明空傘蓋及幢幡鼓樂歌舞妓真珠妙羅網懸以諸寶鈴白拂與華鬘散妙香華等矜羯尼為網如意寶樹王次服天厨雲上妙美香潔樓閣寶嚴淨天瓔珞及冠如是供養雲遍滿虛空界誠心而運想又以印真言聖力所加持虛空庫供給衆聖當受用真實無有殊十度反相交右押左合掌舉印案於頂同樓閣真言次以美言音金剛妙歌讚摩訶麼攞也贊拏也引尾儞夜二合囉惹也難抳寧尾曩野地哩二合多娘也那莫俱嚕二合馱野縛日哩二合儞戒方進力屈二羽虛心合屈度背相著遂成部母契誦明寂靜意七遍護本尊唵矩懶馱哩滿馱滿馱吽發吒吒字半音呼珠蟠合掌中誦大心七遍智方息相捻禪戒亦復然餘度皆直舒進捻於忍背力亦附願上二環用承珠思惟己心中皎白如滿月分明住觀已想部母真議所持之密言從口而流出字字皆金色普放無量光相繼若連珠自行人口入散布月輪上變色隨本尊焰鬘因相穿文句無錯謬行人威武相稱誦祕真言歸命唵皆寂餘文瞋猛意未字戒當捻一珠與句齊住此三昧門極力當持念修行將止息合珠於掌中如前再加持頂戴還本處須臾住靜觀月輪上真言義理及文詞諦思其實相次當出定已真言金色光從口若連珠奉歸部母處應作如是願攝受此真言慈悲加護之無令功用失所得遍數者誦部母加持七遍以護之應作如是法一切有情類諸苦惱逼身於其菩提中不堪任法器我濟彼等故非獨拔己身唯願佛世尊成就還遍數三部三昧契如初重作之次護本尊身用前部母印捧左閼伽器奉獻陳所求儀式不異前次運心供養火院密縫印頭上左放之諸印都解除當奉送衆聖降入道場契智度外彈之又結請輅車聖衆升其上改禪智外撥想歸於本宮如前護己身隨意道場外印塔當轉念方廣大乘經回助口所祈上中下悉地往諸觸穢處慧羽握成拳禪度竪如峯護身加五處真言用捧印不被衆魔羅此遍說運心加飲食尤上隨辦任陳布用大心真言欲去萎花時誦此祕明曰唵濕廢二合帝摩訶濕廢二合帝佉去音娜寧娑嚩二合引賀引若欲睡眠者以部母護身部主契真言用護其處所如前降入契智度押進傍當誦後真言警相當清淨唵嚩日囉二合特力失精及惡夢百遍部母明凡欲喫食時團食置其處所持明加護奉獻於本尊部主前真言加持食乃食次陳四微妙儀軌當修習扇底迦寂災聰明及長壽并除冤禍法面北交脛居竪膝右脛先衣服當潔白食飲香華地燈燭亦復然月輪布真言文字亦宜白先并歸命誦三七乃除之從唵起為初與某甲除禍娑嚩二合訶最後本無臨事加念誦以小聲當須寂靜意若作大壇者圓穿其爐形於中宜泥輪護尊忿猛相若求增長者名布瑟置迦五通及轉輪寶藏輪劍杵致一切財物藥丸眼藥俱面東結跏趺其色皆上赤增減真言句如前無復殊欲稱娑嚩訶其所求如願小聲寂靜意護尊忿猛為大壇方穿爐安杵具三股若求歡愛法名嚩施加囉召人及天龍鬼神非人類面西半跏坐上赤增長同加減歸命文娑嚩訶亦爾與某甲攝某成就願所求持明歡喜心護尊寂靜意并以忩猛相二種皆護之爐如八葉蓮開敷具臺蘂若作降伏法阿毗遮嚕迦制鬼神惡人損壞三寶者左足指押右西面坐蹲居亦大忿怒形諸色上青黑心中圓明觀變用大日輪熾盛無與儔發輝如猛焰除去娑嚩訶願為某甲成某事吽發心火爐三角作獨股杵置中真言猛勵稱傍人如可聽護尊寂靜意事法次當陳相應置本尊中間是爐位或於精室外爐遙對於尊治地二肘間形隨爐口勢築階高一指中量一肘穿深半肘成爐周緣高四指一寸外方作爐成如法治輪杵泥為之置中稱其底瞿摩夷塗飾檀香等又施其色隨所求階上祥茅草隨日匝旋布以本覆其苗所燒物在茅近行人右手二器閼伽水置茅在戶邊柴相隨頰推長截十指量酥蜜乳酪內搵其薪兩頭半爐熾炭充投亦起威焰燧火勿以舊用扇非口吹燃爐誦後明三遍成加持唵步入嚩二合攞吽火既發光焰當用忿怒王瀉垢能淨除祕契如是結二羽背相著八度以類鉤轉腕反相合成拳遍印物每觸皆稱誦次後祕真言唵枳里枳里吽頗吒吒字半音又當請火天直舒其慧羽禪橫約於掌微以進度招每招誦後明三遍火天降唵曀係曳呬摩訶步多泥去嚩哩使二合儞尾惹娑多麼仡俚二合呬引怛嚩二合護底莽引訶引囉麼塞汦散儞呬覩婆嚩阿仡曩二合曳賀尾也迦尾也嚩引訶曩引也娑嚩二合引訶引便想入爐內次結三昧耶彈捻檀度初舒餘波羅蜜直灑閼伽水於火成淨除三灑皆誦明真言句如後唵阿蜜哩二合帝訶曩訶曩吽發吒吒字半音呼次以其慧羽右旋灑閼伽誦文殊密言想漱火天口唵嚩囉娜嚩日囉二合曇太杓定羽執小者慧當持三度取名蘇灌其大杓滿慧捨小執大有劍等按之誦次後真言句終灌火上阿仡曩曳賀尾也迦尾也嚩引訶曩也儞波也儞波也娑嚩二合引賀引每至其訶字皆引聲長呼空杓却按之其音即齊畢非加劍藥類但灌不按杓是則祀火天三度皆如此依前再淨火漱口用文殊請火天出爐東南方就位當設諸供養次請部主尊爐中遠行人諦想依位住又念本尊入爐中近行人與部主相當二聖儼而對忿怒王瀉垢淨火漱口明如法重為之二羽膝間住如前祀火法各獻三杓酥每先想己身本尊與部主火及劍藥等一相無有殊五體既合同各以本明獻如是供養已隨求事護摩觀其應所燒宜杓或宜手所須用杓類取前小者澆執已進度舒令順於其柄檀戒及忍等共掘禪度初定羽掐其珠一誦一投火遍數既畢已如前各獻珠二聖歸於壇又誦火天祀三大杓酥畢依位如其初若須祀八方一一皆當請解界如儀送火天契次陳如前請召時進禪以相捻誦後明一遍火天還於宮布爾覩徒麼也薄底也二合蘖蹉阿仡儞娑嚩二合婆嚩南補曩羅跛夜二合那也娑嚩二合引賀引如前護己身衆魔不復擾若夢佛菩薩金剛諸天王婆羅門居士食粳米酪飯甘露乳果花茂林若登山履塔及樓閣或乘車馬象白鶴孔雀王金翅鳥與同泛海清流水或騰空自在威焰遍於身或聽法座中及諸清淨事此皆成就應況已勿復眠若夢魁膾人猪驢駱駝狗或觸或在近死尸亦復然惡鬼怖畏徒是障不是相或有妄念起違闕三昧耶當誦此真言以除其過患如前金剛杵進力改相合忍願依甲傍繞上亦相拄真言如後誦三七障皆消大輪明曰娜莫悉底哩三合野地尾二合迦南怛他誐哆喃唵尾囉耳尾囉耳摩訶縛日哩二合薩哆薩哆娑引囉帝娑引囉帝哆囉二合以哆囉二合以尾淡末作糝伴惹儞哆囉二合末底悉馱蘖囇二合怛㘕二合娑嚩二合引訶凡所觀想時閉目凝心作了了分明已目覩道當成護世八方天真言如後說八方天明摩醯首羅王位居東北隅真言如後稱諸天所尊奉唵嚕捺囉二合引也娑嚩二合引訶引東方帝釋位真言曰唵設揭囉二合引也娑嚩二合引訶引東南方名火天真言曰唵娜仡曩二合曳娑嚩二合引賀引南方閻羅天位真言曰唵吠嚩娑嚩二合引哆引也娑嚩二合引賀引西南方羅主真言曰唵囉乞叉二合娑引地跛多曳娑嚩二合引賀西方水天位真言曰唵冥伽捨曩也娑嚩二合引賀西北方風天位真言曰唵嚩引也吠娑嚩二合引賀北方毗沙門天真言曰唵藥乞叉二合尾儞夜馱哩娑嚩二合賀引迎請八方尊及須供養者隨其所願事皆用本真言凡建曼茶羅及興諸事法皆先施供養飲食香燈明閼伽花塗香物皆周匝布永無一切障所願皆遂心本尊及部主皆用本真言序中舊云逶迤搊擲請改為逶迤輪擲也又下卷初心密言法中舊云若得莽羅葉博伽得博伽稱及咄嚕瑟劍蘇合香也末和芥子以進火中一千八遍令衆人敬真言者請改為若零陵香天竺蘇合香末和芥子油進火中一千八遍令人福德儀中舊脫四句請知之諸色上青黑心中漸圓明變用大日輪熾盛無與儔發輝如猛焰
